name: Update Markets & Deploy

on:
  schedule:
    # 每 30 分钟更新一次
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Polymarket API
        run: |
          echo "[$(date)] 开始更新 markets.json ..."

          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/raw_markets.json \
            -H "User-Agent: Mozilla/5.0 (Polymarket-Radar-Bot)" \
            --connect-timeout 10 \
            --max-time 30 \
            "https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=100&order=volume24hr&ascending=false")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ API 请求失败 HTTP $HTTP_CODE，使用现有 markets.json"
          else
            if python3 -c "import json; d=json.load(open('/tmp/raw_markets.json')); assert len(d)>0" 2>/dev/null; then
              echo "✅ API 数据拉取成功"
            else
              echo "⚠️ 返回数据无效，使用现有 markets.json"
              HTTP_CODE="INVALID"
            fi
          fi

          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV

      - name: Process markets.json
        if: env.HTTP_CODE == '200'
        run: |
          python3 -c "
          import json
          from datetime import datetime, timezone

          with open('/tmp/raw_markets.json') as f:
              raw = json.load(f)

          markets = []
          for m in raw:
              try:
                  prices = json.loads(m.get('outcomePrices', '[]'))
                  yp = float(prices[0]) if prices else 0
              except:
                  yp = 0

              vol = m.get('volume24hr', 0) or 0
              if vol == 0 and yp < 0.01:
                  continue

              evt = (m.get('events') or [{}])[0]

              markets.append({
                  'id': m.get('id', ''),
                  'question': m.get('question', ''),
                  'slug': m.get('slug', ''),
                  'eventSlug': evt.get('slug', ''),
                  'eventTitle': evt.get('title', ''),
                  'endDate': m.get('endDate', ''),
                  'createdAt': m.get('createdAt', ''),
                  'outcomePrices': m.get('outcomePrices', '[]'),
                  'outcomes': m.get('outcomes', '[]'),
                  'lastTradePrice': m.get('lastTradePrice', 0) or 0,
                  'bestBid': m.get('bestBid', 0) or 0,
                  'bestAsk': m.get('bestAsk', 0) or 0,
                  'oneHourPriceChange': m.get('oneHourPriceChange', 0) or 0,
                  'oneDayPriceChange': m.get('oneDayPriceChange', 0) or 0,
                  'oneWeekPriceChange': m.get('oneWeekPriceChange', 0) or 0,
                  'volume24hr': vol,
                  'volume1wk': m.get('volume1wk', 0) or 0,
                  'liquidityNum': m.get('liquidityNum', 0) or 0,
              })

          data = {
              'lastUpdated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'source': 'Gamma API | polymarket.com',
              'marketCount': len(markets),
              'markets': markets
          }

          with open('markets.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False)

          print(f'✅ 已更新 {len(markets)} 个市场')
          "

      - name: Commit updated data
        if: env.HTTP_CODE == '200'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add markets.json
          git diff --cached --quiet || git commit -m "🔄 Auto-update markets.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name polymarket-radar-pages --branch main --commit-dirty=true
